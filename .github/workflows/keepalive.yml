name: 🔄 Keep Alive - Prevent Streamlit Sleep

on:
  schedule:
    # Ping setiap 25 menit
    - cron: '*/25 * * * *'
  workflow_dispatch: # Bisa di-trigger manual dari tab Actions GitHub

jobs:
  keepalive:
    name: Ping sahamidx.streamlit.app
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📡 Ping App
        run: |
          APP_URL="https://sahamidx.streamlit.app/"

          echo "🔄 Pinging: $APP_URL"

          HTTP_STATUS=$(curl -L \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36" \
            --max-time 30 \
            -s \
            -o /dev/null \
            -w "%{http_code}" \
            "$APP_URL")

          echo "✅ HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "🟢 App aktif dan merespons dengan baik."
          else
            echo "🔴 App merespons dengan status $HTTP_STATUS"
          fi

      - name: 🕒 Log Waktu Ping
        run: |
          echo "Ping dilakukan pada: $(TZ='Asia/Jakarta' date '+%Y-%m-%d %H:%M:%S WIB')"
