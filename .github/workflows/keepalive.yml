name: 🔄 Keep Alive - Prevent Streamlit Sleep

on:
  schedule:
    # Ping setiap 5 menit (minimum GitHub Actions)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Bisa di-trigger manual dari tab Actions GitHub

jobs:
  keepalive:
    name: Ping sahamidx.streamlit.app
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📡 Ping App
        run: |
          APP_URL="https://sahamidx.streamlit.app/"

          echo "🔄 Pinging: $APP_URL"

          # Gunakan --max-redirs 5 (jangan -L tanpa batas → exit code 47)
          # -I : hanya ambil header (HEAD request, lebih ringan)
          # --max-redirs 5 : izinkan max 5 redirect
          HTTP_STATUS=$(curl \
            -I \
            --max-redirs 5 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36" \
            --max-time 30 \
            -s \
            -o /dev/null \
            -w "%{http_code}" \
            "$APP_URL")

          echo "✅ HTTP Status: $HTTP_STATUS"

          # Terima 2xx DAN 3xx sebagai "app hidup"
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 500 ]; then
            echo "🟢 App aktif dan merespons (HTTP $HTTP_STATUS)."
          else
            echo "🔴 App merespons dengan status $HTTP_STATUS — mungkin error."
            exit 1
          fi

      - name: 🕒 Log Waktu Ping
        run: |
          echo "Ping dilakukan pada: $(TZ='Asia/Jakarta' date '+%Y-%m-%d %H:%M:%S WIB')"
