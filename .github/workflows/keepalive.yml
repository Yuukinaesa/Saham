name: 🔄 Keep Alive - Prevent Streamlit Sleep

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  keepalive:
    name: Ping sahamidx.streamlit.app
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📡 Ping App
        run: |
          python3 - <<'EOF'
          import urllib.request
          import urllib.error
          import ssl
          import sys
          from datetime import datetime, timezone, timedelta

          URL = "https://sahamidx.streamlit.app/"
          WIB = timezone(timedelta(hours=7))
          now = datetime.now(WIB).strftime("%Y-%m-%d %H:%M:%S WIB")

          print(f"🔄 Pinging {URL}")
          print(f"🕒 Waktu: {now}")

          try:
              req = urllib.request.Request(
                  URL,
                  headers={"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0"}
              )
              # Buat handler yang toleran terhadap redirect panjang
              opener = urllib.request.build_opener(
                  urllib.request.HTTPRedirectHandler()
              )
              opener.addheaders = [("User-Agent", "Mozilla/5.0")]
              
              response = opener.open(req, timeout=30)
              print(f"✅ HTTP Status: {response.status}")
              print("🟢 App aktif dan merespons dengan baik.")

          except urllib.error.HTTPError as e:
              # HTTPError berarti server merespons (hanya error code)
              print(f"✅ HTTP Status: {e.code}")
              if e.code < 500:
                  print("🟡 App merespons (mungkin butuh wake up).")
              else:
                  print("🔴 App error server.")
                  sys.exit(1)

          except Exception as e:
              # Koneksi gagal total — jangan fail workflow
              print(f"⚠️ Tidak bisa terhubung: {e}")
              print("🔴 App mungkin sedang sleep total.")
              # Tidak sys.exit(1) agar workflow tidak merah

          EOF
