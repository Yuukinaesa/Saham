name: 🔄 Keep Alive - Prevent Streamlit Sleep

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  keepalive:
    name: Wake Streamlit App
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      - name: 🤖 Run Selenium script
        run: python main.py
        env:
          STREAMLIT_APP_URL: https://sahamidx.streamlit.app/

      - name: 📝 Update Keep Alive File
        run: |
          echo "Last keep-alive ping: $(date)" > .github/keepalive.txt

      - name: 🚀 Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive.txt
          git commit -m "🔄 chore: keep alive streamlit app to prevent sleep" || echo "No changes to commit"
          git push
