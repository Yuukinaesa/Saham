name: 🔄 Keep Alive - Prevent Streamlit Sleep

on:
  schedule:
    - cron: '0 */6 * * *' # Menjalankan workflow setiap 6 jam
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    name: Ping and Commit to Keep App Awake
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📡 Ping App
        run: |
          echo "Pinging https://sahamidx.streamlit.app/..."
          curl -sL --max-time 30 https://sahamidx.streamlit.app/ > /dev/null || echo "Ping failed or timeout, but moving on."
          echo "Ping completed."

      - name: 📝 Update Keep Alive File
        run: |
          echo "Last keep-alive ping: $(date)" > .github/keepalive.txt

      - name: 🚀 Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive.txt
          # Hanya commit kalau ada perubahan
          git commit -m "🔄 chore: keep alive streamlit app to prevent sleep" || echo "No changes to commit"
          git push
