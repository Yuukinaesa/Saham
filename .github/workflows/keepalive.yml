name: 🔄 Keep Alive - Prevent Streamlit Sleep

on:
  schedule:
    - cron: '0 */6 * * *' # Menjalankan workflow setiap 6 jam
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    name: Ping and Commit to Keep App Awake
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 📦 Install Selenium & Webdriver
        run: pip install selenium webdriver-manager

      - name: 🤖 Simulate Real User Visit with Selenium
        run: |
          python -c "
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager
          import time

          print('Starting Headless Chrome...')
          options = Options()
          options.add_argument('--headless')
          options.add_argument('--no-sandbox')
          options.add_argument('--disable-dev-shm-usage')
          options.add_argument('window-size=1920x1080')
          options.add_argument('user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36')

          service = Service(ChromeDriverManager().install())
          driver = webdriver.Chrome(service=service, options=options)

          print('Visiting https://sahamidx.streamlit.app/ ...')
          try:
              driver.get('https://sahamidx.streamlit.app/')
              print('Waiting 10 seconds for Streamlit to render...')
              time.sleep(10)
              print(f'Page Title: {driver.title}')
              print('Success: Simulated ' + 'Real Human' + ' visit completed! App is fully awake.')
          except Exception as e:
              print(f'Warning: Could not fetch page properly: {e}')
          finally:
              driver.quit()
          "

      - name: 📝 Update Keep Alive File
        run: |
          echo "Last keep-alive ping: $(date)" > .github/keepalive.txt

      - name: 🚀 Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive.txt
          # Hanya commit kalau ada perubahan
          git commit -m "🔄 chore: keep alive streamlit app to prevent sleep" || echo "No changes to commit"
          git push
