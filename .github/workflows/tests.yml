name: 🧪 Test Suite & Security Audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: Run Tests & Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: 🧪 Run unit tests
        run: python -m unittest discover -s tests -v

      - name: 🔒 Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          ! grep -rn "API_KEY\s*=\s*['\"]" --include="*.py" --exclude-dir=tests . || exit 1
          ! grep -rn "SECRET_KEY\s*=\s*['\"]" --include="*.py" --exclude-dir=tests . || exit 1
          ! grep -rn "PASSWORD\s*=\s*['\"]" --include="*.py" --exclude-dir=tests . || exit 1
          echo "No hardcoded secrets found ✅"

      - name: 📋 Validate requirements.txt
        run: |
          echo "Checking dependency version bounds..."
          python -c "
          with open('requirements.txt') as f:
              for line in f:
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  if '>=' in line and '<' not in line:
                      print(f'WARNING: {line} has no upper bound')
                      exit(1)
          print('All dependencies have proper version bounds ✅')
          "

      - name: 🔍 Syntax validation
        run: |
          echo "Checking Python syntax..."
          python -c "
          import ast, os
          errors = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in {'.git', '__pycache__', 'venv', '.venv'}]
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      with open(path) as fh:
                          try:
                              ast.parse(fh.read())
                          except SyntaxError as e:
                              errors.append(f'{path}: {e}')
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              exit(1)
          print('All Python files have valid syntax ✅')
          "
