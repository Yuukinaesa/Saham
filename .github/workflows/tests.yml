name: 🧪 Test Suite & Security Audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: Run Tests & Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests

      - name: 🧪 Run unit tests
        run: python -m unittest discover -s tests -v

      - name: 🔒 Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          FOUND=0
          for pattern in "API_KEY\s*=\s*['\"]" "SECRET_KEY\s*=\s*['\"]" "PASSWORD\s*=\s*['\"]" "TOKEN\s*=\s*['\"]"; do
            if grep -rn "$pattern" --include="*.py" --exclude-dir=tests --exclude-dir=.git . 2>/dev/null; then
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "FAIL: Hardcoded secrets found!"
            exit 1
          fi
          echo "No hardcoded secrets found ✅"

      - name: 📋 Validate requirements.txt
        run: |
          echo "Checking dependency version bounds..."
          python -c "
          with open('requirements.txt') as f:
              for line in f:
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  if '>=' in line and '<' not in line:
                      print(f'FAIL: {line} has no upper bound')
                      exit(1)
          print('All dependencies have proper version bounds ✅')
          "

      - name: 🔍 Syntax validation
        run: |
          echo "Checking Python syntax..."
          python -c "
          import ast, os
          errors = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in {'.git', '__pycache__', 'venv', '.venv'}]
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      with open(path) as fh:
                          try:
                              ast.parse(fh.read())
                          except SyntaxError as e:
                              errors.append(f'{path}: {e}')
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              exit(1)
          print('All Python files have valid syntax ✅')
          "

      - name: 🛡️ Security headers check
        run: |
          echo "Verifying security configuration..."
          python -c "
          # Check Streamlit config has security settings
          with open('.streamlit/config.toml') as f:
              content = f.read()
          assert 'enableXsrfProtection = true' in content, 'XSRF protection must be enabled'
          assert 'enableCORS = true' in content, 'CORS must be enabled'
          assert 'gatherUsageStats = false' in content, 'Usage stats must be disabled'
          print('Security configuration verified ✅')
          
          # Check SECURITY.md exists and has incident response
          with open('SECURITY.md') as f:
              sec = f.read()
          assert 'Incident Response' in sec, 'SECURITY.md must contain incident response plan'
          assert 'OWASP' in sec, 'SECURITY.md must reference OWASP'
          print('Security documentation verified ✅')
          "

      - name: 📊 Test coverage summary
        run: |
          echo "Test suite summary:"
          python -m unittest discover -s tests 2>&1 | tail -3
