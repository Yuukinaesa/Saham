[theme]
base="light"
primaryColor="#2B8CCE"
backgroundColor="#FFFFFF"
secondaryBackgroundColor="#F0F2F6"
textColor="#000000"

[server]
enableCORS = true
enableXsrfProtection = true
maxUploadSize = 5
# Restrict static file serving to prevent path traversal
enableStaticServing = false

[browser]
gatherUsageStats = false

[runner]
# Prevent accidental write-access to source files
fastReruns = true
